name: Sync All Cangjie Repos (Pull & Push)

on:
  schedule:
    - cron: '33 * * * *' # Runs at 33 minutes past the hour
  workflow_dispatch:

jobs:
  sync-job:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo_name:
          - cangjie_compiler
          - cangjie_docs
          - cangjie_multiplatform_interop
          - cangjie_runtime
          - cangjie_stdx
          - cangjie_tools
          - llvm-project

    steps:
      - name: Sync ${{ matrix.repo_name }}
        run: |
          # --- 1. 配置变量 ---
          # 目标 (GitHub): 使用 Token 认证
          TARGET_URL="https://cangjie-bot:${{ secrets.GH_PAT }}@github.com/cangjie-bot/${{ matrix.repo_name }}.git"
          # 源 (GitCode): 公开读取
          SOURCE_URL="https://gitcode.com/Cangjie/${{ matrix.repo_name }}.git"
          
          echo ">>> 正在处理仓库: ${{ matrix.repo_name }}"

          # --- 2. 检查远程引用 (Pre-check) ---
          echo ">>> 正在对比远程引用..."
          
          # 获取 Source (GitCode) 和 Target (GitHub) 的 heads 和 tags
          # 使用 awk 交换 SHA 和 REF 的位置并排序，以确保对比结果准确
          git ls-remote --heads --tags "$SOURCE_URL" | awk '{print $2, $1}' | sort > source_refs.txt
          git ls-remote --heads --tags "$TARGET_URL" | awk '{print $2, $1}' | sort > target_refs.txt
          
          if cmp -s source_refs.txt target_refs.txt; then
            echo ">>> 仓库 ${{ matrix.repo_name }} 已经是最新状态，无需同步。"
            exit 0
          fi

          echo ">>> 检测到变更，开始执行同步..."

          # --- 3. Clone GitHub (作为基准) ---
          # 使用 --bare 模式，因为我们不需要检出代码文件，只需要 .git 目录及历史记录
          echo ">>> Step 1: Clone from GitHub..."
          git clone --bare $TARGET_URL repo_dir
          
          cd repo_dir

          # --- 4. Fetch GitCode (获取更新) ---
          # 添加 GitCode 为远程仓库 'upstream'
          git remote add upstream $SOURCE_URL
          
          echo ">>> Step 2: Fetching from GitCode..."
          # 核心逻辑：将 GitCode 的所有分支和 Tag 强制 Fetch 到本地
          git fetch upstream +refs/heads/*:refs/heads/* --prune
          # 使用强制引用映射拉取 tags，避免 "would clobber existing tag" 被拒绝
          git fetch upstream +refs/tags/*:refs/tags/*

          # --- 5. Push GitHub (推送变更) ---
          echo ">>> Step 3: Pushing back to GitHub..."
          # 将本地状态强制推送到 origin (即 GitHub)
          git push origin --all --force
          git push origin --tags --force
          
          echo ">>> Sync finished for: ${{ matrix.repo_name }}"
